<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mundo do Conhecimento 3D - Versão Estável</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background: #333; }
  #renderCanvas { width:100%; height:100%; touch-action: none; }
  #quizBox {
    position:absolute; bottom:20px; left:20px;
    background:rgba(255,255,255,0.9); padding:15px; border-radius:10px; 
    display:none; font-family: sans-serif; box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }
  button { cursor: pointer; margin: 5px 0; padding: 5px 10px; width: 100%; }
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="quizBox">
  <strong id="pergunta"></strong>
  <div id="opcoes"></div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

let score = 0;
let fase = 1;
let acertos = 0;
let player;

const bancoQuestoes = {
  "1": [
    { p: "2 + 2 = ?", o:["3","4","5"], r:1 },
    { p: "5 - 2 = ?", o:["2","3","4"], r:1 },
    { p: "Animal vertebrado?", o:["cachorro","pedra","água"], r:0 },
  ],
  "2": [
    { p: "7 x 8 = ?", o:["54","56","58"], r:1 },
    { p: "Plural de flor?", o:["flors","flores","flore"], r:1 },
  ]
};

function criarCena() {
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1); // Céu azul

  const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, 5, -15), scene);
  camera.setTarget(BABYLON.Vector3.Zero());
  camera.attachControl(canvas, true);

  new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

  const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:50, height:50}, scene);
  const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
  // Link de textura garantido
  groundMat.diffuseTexture = new BABYLON.Texture("https://playground.babylonjs.com/textures/grass.jpg", scene);
  ground.material = groundMat;

  // IMPORTAÇÃO DO PERSONAGEM (Usando o link oficial do Playground)
  BABYLON.SceneLoader.ImportMesh("", "https://playground.babylonjs.com/scenes/Dude/", "Dude.babylon", scene, function (meshes, particleSystems, skeletons) {
      player = meshes[0]; 
      // O Dude é composto por várias partes, o meshes[0] é a raiz no .babylon
      player.scaling = new BABYLON.Vector3(0.05, 0.05, 0.05);
      player.position = new BABYLON.Vector3(0, 0, 0);
      player.rotation.y = Math.PI;

      if (skeletons.length > 0) {
          scene.beginAnimation(skeletons[0], 0, 100, true);
      }
  });

  // Blocos interativos
  for(let i=0; i<5; i++){
    let bloco = BABYLON.MeshBuilder.CreateBox("b"+i, {size:2}, scene);
    bloco.position.x = Math.random()*20-10;
    bloco.position.z = Math.random()*20-10;
    bloco.position.y = 1;
    
    let boxMat = new BABYLON.StandardMaterial("boxMat", scene);
    boxMat.diffuseColor = new BABYLON.Color3(1, 0, 0);
    bloco.material = boxMat;

    bloco.actionManager = new BABYLON.ActionManager(scene);
    bloco.actionManager.registerAction(
      new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnPickTrigger, () => abrirPergunta())
    );
  }

  return scene;
}

const scene = criarCena();

let input = {};
window.addEventListener("keydown", e => input[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => input[e.key.toLowerCase()] = false);

scene.onBeforeRenderObservable.add(() => {
  if(!player) return;
  let speed = 0.15;
  if(input["w"]) player.position.z += speed;
  if(input["s"]) player.position.z -= speed;
  if(input["a"]) player.position.x -= speed;
  if(input["d"]) player.position.x += speed;
});

function abrirPergunta(){
  let lista = bancoQuestoes[fase.toString()] || bancoQuestoes["1"];
  let q = lista[Math.floor(Math.random()*lista.length)];

  document.getElementById("quizBox").style.display = "block";
  document.getElementById("pergunta").innerText = q.p;

  let opHTML = "";
  q.o.forEach((op, i) => {
    opHTML += `<button onclick="responder(${i}, ${q.r})">${op}</button>`;
  });
  document.getElementById("opcoes").innerHTML = opHTML;
}

window.responder = function(escolha, correta){
  if(escolha === correta){
    alert("✔ Acertou!");
    acertos++;
  } else {
    alert("❌ Errou!");
  }
  document.getElementById("quizBox").style.display = "none";
};

engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());
</script>

</body>
</html>
